name: Build (Windows · macOS · Linux)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: osu-collector-gui-windows
          - os: macos-latest
            artifact: osu-collector-gui-macos
          - os: ubuntu-latest
            artifact: osu-collector-gui-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # --- Linux needs a webview backend (GTK + WebKit2) at build time ---
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev gir1.2-webkit2-4.1 \
            gir1.2-gtk-3.0 python3-gi python3-gi-cairo

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install backend extras (Linux GTK)
        if: runner.os == 'Linux'
        run: pip install "pywebview[gtk]"

      - name: Install backend extras (macOS WebKit)
        if: runner.os == 'macOS'
        run: pip install pyobjc-framework-WebKit pyobjc-framework-Cocoa

      # ----------------------------- builds -----------------------------
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --name osu-collector-gui `
            --icon packaging/icon.ico `
            --add-data "web;web" `
            osu_collector_gui.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --windowed \
            --name osu-collector-gui \
            --icon packaging/icon.icns \
            --add-data "web:web" \
            --osx-bundle-identifier com.r3d.osucollectorgui \
            osu_collector_gui.py
          # Zip the .app so it can be uploaded/downloaded intact.
          cd dist && zip -r -y osu-collector-gui-macos.zip "osu-collector-gui.app"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --noconfirm --windowed --onefile \
            --name osu-collector-gui \
            --add-data "web:web" \
            osu_collector_gui.py

      # --------------------------- smoke checks -------------------------
      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "dist\osu-collector-gui.exe"
          if (-not (Test-Path $exe)) { throw "missing $exe" }
          if ((Get-Item $exe).Length -lt 1MB) { throw "$exe suspiciously small" }
          Write-Host "Built $exe"

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            test -d "dist/osu-collector-gui.app" || { echo "missing .app"; exit 1; }
            test -f "dist/osu-collector-gui-macos.zip" || { echo "missing zip"; exit 1; }
          else
            test -f "dist/osu-collector-gui" || { echo "missing binary"; exit 1; }
          fi
          echo "build present"

      # ------------------------------ upload ----------------------------
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/osu-collector-gui.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/osu-collector-gui-macos.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/osu-collector-gui
          if-no-files-found: error
          retention-days: 30

      # --------------------- release on version tags --------------------
      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/osu-collector-gui.exe
            dist/osu-collector-gui-macos.zip
            dist/osu-collector-gui
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
