name: Build installers (Windows · macOS · Linux)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: osu-collector-gui-windows-setup
          - os: macos-latest
            artifact: osu-collector-gui-macos-dmg
          - os: ubuntu-latest
            artifact: osu-collector-gui-linux-appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev libcairo2-dev pkg-config \
            gir1.2-webkit2-4.1 gir1.2-gtk-3.0 \
            python3-gi python3-gi-cairo \
            gobject-introspection libfuse2

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install backend extras (Linux GTK)
        if: runner.os == 'Linux'
        run: pip install "pywebview[gtk]"

      - name: Install backend extras (macOS WebKit)
        if: runner.os == 'macOS'
        run: pip install pyobjc-framework-WebKit pyobjc-framework-Cocoa

      # ============================== WINDOWS ==============================
      - name: Build exe (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --name osu-collector-gui `
            --icon packaging/icon.ico `
            --add-data "web;web" `
            osu_collector_gui.py

      - name: Build installer (Windows / Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = (Select-String -Path osu_collector_gui.py `
            -Pattern 'APP_VERSION = "([^"]+)"').Matches[0].Groups[1].Value
          Write-Host "Version: $ver"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          # --- bundle installer dependencies (Collection Manager CLI + WebView2) ---
          New-Item -ItemType Directory -Force -Path deps\cm-cli | Out-Null
          Write-Host "Fetching Collection Manager CLI..."
          Invoke-WebRequest -UseBasicParsing -Uri "https://github.com/Piotrekol/CollectionManager/releases/latest/download/CollectionManager-CLI.zip" -OutFile deps\cm-cli.zip
          Expand-Archive -Path deps\cm-cli.zip -DestinationPath deps\cm-cli -Force
          Remove-Item deps\cm-cli\*.pdb -ErrorAction SilentlyContinue
          if (-not (Test-Path "deps\cm-cli\CollectionManager.App.Cli.exe")) { throw "CM CLI not unpacked" }
          Write-Host "Fetching Edge WebView2 bootstrapper..."
          Invoke-WebRequest -UseBasicParsing -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile deps\MicrosoftEdgeWebview2Setup.exe
          Write-Host "Fetching .NET Framework 4.8 web installer..."
          Invoke-WebRequest -UseBasicParsing -Uri "https://go.microsoft.com/fwlink/?LinkId=2085155" -OutFile deps\ndp48-web.exe
          & $iscc "/DAppVersion=$ver" packaging\windows-installer.iss
          if (-not (Test-Path "Output\osu-collector-gui-Setup.exe")) {
            throw "installer not produced"
          }

      # =============================== MACOS ===============================
      - name: Build app + dmg (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --windowed \
            --name osu-collector-gui \
            --icon packaging/icon.icns \
            --add-data "web:web" \
            --osx-bundle-identifier com.r3d.osucollectorgui \
            osu_collector_gui.py
          test -d "dist/osu-collector-gui.app" || { echo "no .app"; exit 1; }
          # hdiutil intermittently fails with "Resource busy" when Spotlight /
          # diskarbitration is still touching the freshly-built .app. Retry.
          for attempt in 1 2 3 4 5; do
            if hdiutil create -volname "osu-collector-gui" \
                 -srcfolder "dist/osu-collector-gui.app" \
                 -ov -format UDZO "dist/osu-collector-gui.dmg"; then
              echo "dmg created (attempt $attempt)"; break
            fi
            if [ "$attempt" -eq 5 ]; then echo "hdiutil failed after 5 attempts"; exit 1; fi
            echo "hdiutil attempt $attempt failed (likely Resource busy) — retrying in 5s..."
            sleep 5
          done

      # =============================== LINUX ===============================
      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --noconfirm --windowed \
            --name osu-collector-gui \
            --add-data "web:web" \
            osu_collector_gui.py
          test -d "dist/osu-collector-gui" || { echo "no onedir build"; exit 1; }
          mkdir -p AppDir/usr/bin
          cp -r dist/osu-collector-gui/. AppDir/usr/bin/
          cp packaging/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun
          cp packaging/osu-collector-gui.desktop AppDir/osu-collector-gui.desktop
          cp packaging/icon-256.png AppDir/osu-collector-gui.png
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./appimagetool AppDir dist/osu-collector-gui-x86_64.AppImage
          test -f "dist/osu-collector-gui-x86_64.AppImage" || { echo "no AppImage"; exit 1; }

      # ============================== UPLOAD ===============================
      - name: Upload (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: Output/osu-collector-gui-Setup.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/osu-collector-gui.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Upload (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/osu-collector-gui-x86_64.AppImage
          if-no-files-found: error
          retention-days: 30

      # ===================== RELEASE ON VERSION TAGS =======================
      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Output/osu-collector-gui-Setup.exe
            dist/osu-collector-gui.dmg
            dist/osu-collector-gui-x86_64.AppImage
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
