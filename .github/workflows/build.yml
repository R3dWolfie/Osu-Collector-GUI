name: Build installers (Windows · macOS · Linux)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: osu-collector-gui-windows-setup
          - os: macos-latest
            artifact: osu-collector-gui-macos-dmg
          - os: ubuntu-latest
            artifact: osu-collector-gui-linux-appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev libcairo2-dev pkg-config \
            gir1.2-webkit2-4.1 gir1.2-gtk-3.0 \
            python3-gi python3-gi-cairo \
            gobject-introspection libfuse2

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install backend extras (Linux GTK)
        if: runner.os == 'Linux'
        run: pip install "pywebview[gtk]"

      - name: Install backend extras (macOS WebKit)
        if: runner.os == 'macOS'
        run: pip install pyobjc-framework-WebKit pyobjc-framework-Cocoa

      # ============================== WINDOWS ==============================
      - name: Build exe (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --name osu-collector-gui `
            --icon packaging/icon.ico `
            --add-data "web;web" `
            osu_collector_gui.py

      - name: Build installer (Windows / Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = (Select-String -Path osu_collector_gui.py `
            -Pattern 'APP_VERSION = "([^"]+)"').Matches[0].Groups[1].Value
          Write-Host "Version: $ver"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          # --- bundle installer dependencies (Collection Manager CLI + WebView2) ---
          New-Item -ItemType Directory -Force -Path deps\cm-cli | Out-Null
          Write-Host "Fetching Collection Manager CLI..."
          Invoke-WebRequest -UseBasicParsing -Uri "https://github.com/Piotrekol/CollectionManager/releases/latest/download/CollectionManager-CLI.zip" -OutFile deps\cm-cli.zip
          Expand-Archive -Path deps\cm-cli.zip -DestinationPath deps\cm-cli -Force
          Remove-Item deps\cm-cli\*.pdb -ErrorAction SilentlyContinue
          if (-not (Test-Path "deps\cm-cli\CollectionManager.App.Cli.exe")) { throw "CM CLI not unpacked" }
          Write-Host "Fetching Edge WebView2 bootstrapper..."
          Invoke-WebRequest -UseBasicParsing -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile deps\MicrosoftEdgeWebview2Setup.exe
          Write-Host "Fetching .NET Framework 4.8 web installer..."
          Invoke-WebRequest -UseBasicParsing -Uri "https://go.microsoft.com/fwlink/?LinkId=2085155" -OutFile deps\ndp48-web.exe
          & $iscc "/DAppVersion=$ver" packaging\windows-installer.iss
          if (-not (Test-Path "Output\osu-collector-gui-Setup.exe")) {
            throw "installer not produced"
          }

      # =============================== MACOS ===============================
      - name: Build app + dmg (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --windowed \
            --name osu-collector-gui \
            --icon packaging/icon.icns \
            --add-data "web:web" \
            --osx-bundle-identifier com.r3d.osucollectorgui \
            osu_collector_gui.py
          test -d "dist/osu-collector-gui.app" || { echo "no .app"; exit 1; }
          # hdiutil intermittently fails with "Resource busy" when Spotlight /
          # diskarbitration is still touching the freshly-built .app. Retry.
          for attempt in 1 2 3 4 5; do
            if hdiutil create -volname "osu-collector-gui" \
                 -srcfolder "dist/osu-collector-gui.app" \
                 -ov -format UDZO "dist/osu-collector-gui.dmg"; then
              echo "dmg created (attempt $attempt)"; break
            fi
            if [ "$attempt" -eq 5 ]; then echo "hdiutil failed after 5 attempts"; exit 1; fi
            echo "hdiutil attempt $attempt failed (likely Resource busy) — retrying in 5s..."
            sleep 5
          done

      # =============================== LINUX ===============================
      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          set -e
          pyinstaller --noconfirm --windowed \
            --name osu-collector-gui \
            --add-data "web:web" \
            osu_collector_gui.py
          test -d "dist/osu-collector-gui" || { echo "no onedir build"; exit 1; }

          ARCHLIB=/usr/lib/x86_64-linux-gnu
          APPDIR="$PWD/AppDir"
          mkdir -p "$APPDIR/usr/bin" \
                   "$APPDIR/usr/lib/girepository-1.0" \
                   "$APPDIR/usr/lib/webkit2gtk-4.1" \
                   "$APPDIR/usr/share/icons/hicolor/256x256/apps" \
                   "$APPDIR/usr/share/applications" \
                   "$APPDIR/apprun-hooks"
          cp -r dist/osu-collector-gui/. "$APPDIR/usr/bin/"
          cp packaging/icon-256.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/osu-collector-gui.png"
          cp packaging/osu-collector-gui.desktop "$APPDIR/usr/share/applications/osu-collector-gui.desktop"

          # WebKit2GTK is loaded at runtime via GObject-Introspection, so bundle
          # its GI typelibs + out-of-process helper binaries explicitly —
          # linuxdeploy can't see this dynamic dependency from the PyInstaller exe.
          cp "$ARCHLIB/girepository-1.0/WebKit2-4.1.typelib" \
             "$ARCHLIB/girepository-1.0/JavaScriptCore-4.1.typelib" \
             "$APPDIR/usr/lib/girepository-1.0/"
          cp -r "$ARCHLIB/webkit2gtk-4.1/." "$APPDIR/usr/lib/webkit2gtk-4.1/"

          # Runtime env (sourced by linuxdeploy's AppRun) so WebKit finds its
          # bundled helpers, libs and typelibs instead of the host's.
          {
            echo 'export WEBKIT_EXEC_PATH="$APPDIR/usr/lib/webkit2gtk-4.1"'
            echo 'export WEBKIT_INJECTED_BUNDLE_PATH="$APPDIR/usr/lib/webkit2gtk-4.1/injected-bundle"'
            echo 'export LD_LIBRARY_PATH="$APPDIR/usr/lib:$LD_LIBRARY_PATH"'
            echo 'export GI_TYPELIB_PATH="$APPDIR/usr/lib/girepository-1.0:$GI_TYPELIB_PATH"'
          } > "$APPDIR/apprun-hooks/osu-collector-webkit.sh"

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/raw/master/linuxdeploy-plugin-gtk.sh -O linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy linuxdeploy-plugin-gtk.sh
          export APPIMAGE_EXTRACT_AND_RUN=1 NO_STRIP=1 DEPLOY_GTK_VERSION=3
          export OUTPUT=osu-collector-gui-x86_64.AppImage
          ./linuxdeploy \
            --appdir "$APPDIR" \
            --executable "$APPDIR/usr/bin/osu-collector-gui" \
            --library "$ARCHLIB/libwebkit2gtk-4.1.so.0" \
            --library "$ARCHLIB/libjavascriptcoregtk-4.1.so.0" \
            --plugin gtk \
            --icon-file packaging/icon-256.png \
            --desktop-file "$APPDIR/usr/share/applications/osu-collector-gui.desktop" \
            --output appimage
          mv osu-collector-gui-x86_64.AppImage dist/osu-collector-gui-x86_64.AppImage
          test -f "dist/osu-collector-gui-x86_64.AppImage" || { echo "no AppImage"; exit 1; }

      # ============================== UPLOAD ===============================
      - name: Upload (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: Output/osu-collector-gui-Setup.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/osu-collector-gui.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Upload (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/osu-collector-gui-x86_64.AppImage
          if-no-files-found: error
          retention-days: 30

      # ===================== RELEASE ON VERSION TAGS =======================
      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Output/osu-collector-gui-Setup.exe
            dist/osu-collector-gui.dmg
            dist/osu-collector-gui-x86_64.AppImage
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
